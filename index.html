<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#09090b" />
    <meta name="color-scheme" content="dark" />
    <script>
      (() => {
        let theme = "dark";
        try {
          if (localStorage.getItem("gridops-theme") === "light") theme = "light";
        } catch {
          // The dark default remains available when storage is blocked.
        }
        document.documentElement.classList.toggle("dark", theme === "dark");
        document.documentElement.dataset.theme = theme;
        document.querySelector('meta[name="color-scheme"]').content = theme;
        document.querySelector('meta[name="theme-color"]').content = theme === "dark" ? "#0d120f" : "#f7faf8";
      })();
    </script>
    <meta name="application-name" content="GridOps" />
    <meta name="apple-mobile-web-app-title" content="GridOps" />
    <meta name="description" content="Provision, autoscale, operate, and observe self-hosted GitHub Actions runners from one control plane." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="GridOps" />
    <meta property="og:title" content="GridOps — GitHub Actions runner control plane" />
    <meta property="og:description" content="Provision, autoscale, operate, and observe self-hosted GitHub Actions runners from one control plane." />
    <meta property="og:image" content="/social-preview.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1280" />

    <meta name="twitter:image" content="/social-preview.jpg" />
    <meta name="twitter:image:alt" content="GridOps — Self-hosted GitHub Actions runner control plane" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <link rel="manifest" href="/site.webmanifest" />
    <title>GridOps — GitHub Actions runner control plane</title>
