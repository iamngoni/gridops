name: gridops

services:
  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    env_file:
      - ${GRIDOPS_ENV_FILE:-.env}
    environment:
      GRIDOPS_BASE_URL: ${GRIDOPS_BASE_URL:-http://localhost:3000}
      GRIDOPS_DATABASE_PATH: /app/data/gridops.sqlite
      GRIDOPS_LOG_DIRECTORY: /app/data/logs
      GRIDOPS_MANAGER_URL: http://manager:8788
      GRIDOPS_API_BIND: 0.0.0.0:8080
      GRIDOPS_WEB_ROOT: /app/web
    ports:
      - "${GRIDOPS_BIND_ADDRESS:-127.0.0.1}:${GRIDOPS_PORT:-3000}:8080"
    volumes:
      - gridops-data:/app/data
    read_only: true
    cpus: 1.0
    mem_limit: 768m
    pids_limit: 256
    oom_score_adj: -500
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      data-init:
        condition: service_completed_successfully
      manager:
        condition: service_healthy
    networks:
      - control-plane

  data-init:
    build:
      context: .
      target: api
    user: "0:0"
    command:
      - /bin/sh
      - -c
      - mkdir -p /app/data/logs && chown -R 10001:10001 /app/data
    volumes:
      - gridops-data:/app/data
    read_only: true
    networks:
      - control-plane

  manager:
    build:
      context: .
      target: manager
    restart: unless-stopped
    environment:
      GRIDOPS_MANAGER_TOKEN: ${GRIDOPS_MANAGER_TOKEN:?GRIDOPS_MANAGER_TOKEN is required}
      GRIDOPS_DOCKER_SOCKET: /var/run/docker.sock
      GRIDOPS_MANAGER_BIND: 0.0.0.0:8788
      GRIDOPS_RUNNER_NETWORK: ${GRIDOPS_RUNNER_NETWORK:-gridops-runners}
      GRIDOPS_RUNNER_CPU_BUDGET: ${GRIDOPS_RUNNER_CPU_BUDGET:-}
      GRIDOPS_RUNNER_MEMORY_BUDGET_MB: ${GRIDOPS_RUNNER_MEMORY_BUDGET_MB:-}
      GRIDOPS_MAX_MANAGED_RUNNERS: ${GRIDOPS_MAX_MANAGED_RUNNERS:-}
      GRIDOPS_MIN_FREE_DISK_MB: ${GRIDOPS_MIN_FREE_DISK_MB:-25600}
      GRIDOPS_MIN_FREE_DISK_PERCENT: ${GRIDOPS_MIN_FREE_DISK_PERCENT:-15}
      GRIDOPS_PROVISIONING_PAUSED: ${GRIDOPS_PROVISIONING_PAUSED:-false}
      GRIDOPS_RUNNER_LOG_MAX_SIZE: ${GRIDOPS_RUNNER_LOG_MAX_SIZE:-20m}
      GRIDOPS_RUNNER_LOG_MAX_FILES: ${GRIDOPS_RUNNER_LOG_MAX_FILES:-5}
      GRIDOPS_RUNNER_PIDS_LIMIT: ${GRIDOPS_RUNNER_PIDS_LIMIT:-1024}
      GRIDOPS_TART_AGENT_URL: ${GRIDOPS_TART_AGENT_URL:-}
      GRIDOPS_TART_AGENT_TOKEN: ${GRIDOPS_TART_AGENT_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    read_only: true
    cpus: 1.0
    mem_limit: 384m
    pids_limit: 128
    oom_score_adj: -500
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --header \"Authorization: Bearer $$GRIDOPS_MANAGER_TOKEN\" http://127.0.0.1:8788/v1/health >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - control-plane

  reconciler:
    build:
      context: .
      target: reconciler
    restart: unless-stopped
    env_file:
      - ${GRIDOPS_ENV_FILE:-.env}
    environment:
      GRIDOPS_DATABASE_PATH: /app/data/gridops.sqlite
      GRIDOPS_LOG_DIRECTORY: /app/data/logs
      GRIDOPS_MANAGER_URL: http://manager:8788
    volumes:
      - gridops-data:/app/data
    read_only: true
    cpus: 1.0
    mem_limit: 512m
    pids_limit: 256
    oom_score_adj: -500
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    depends_on:
      api:
        condition: service_healthy
    networks:
      - control-plane

networks:
  control-plane:
    driver: bridge

volumes:
  gridops-data:
