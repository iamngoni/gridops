name: gridops

services:
  web:
    build:
      context: .
      target: web
    restart: unless-stopped
    ports:
      - "${GRIDOPS_PORT:-3000}:3000"
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      api:
        condition: service_healthy
    networks:
      - control-plane

  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    env_file:
      - ${GRIDOPS_ENV_FILE:-.env}
    environment:
      GRIDOPS_BASE_URL: ${GRIDOPS_BASE_URL:-http://localhost:3000}
      GRIDOPS_DATABASE_PATH: /app/data/gridops.sqlite
      GRIDOPS_LOG_DIRECTORY: /app/data/logs
      GRIDOPS_MANAGER_URL: http://manager:8788
      GRIDOPS_API_BIND: 0.0.0.0:8080
    volumes:
      - gridops-data:/app/data
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      manager:
        condition: service_healthy
    networks:
      - control-plane

  manager:
    build:
      context: .
      target: manager
    restart: unless-stopped
    environment:
      GRIDOPS_MANAGER_TOKEN: ${GRIDOPS_MANAGER_TOKEN:?GRIDOPS_MANAGER_TOKEN is required}
      GRIDOPS_DOCKER_SOCKET: /var/run/docker.sock
      GRIDOPS_MANAGER_BIND: 0.0.0.0:8788
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --header 'Authorization: Bearer $$GRIDOPS_MANAGER_TOKEN' http://127.0.0.1:8788/v1/health >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - control-plane

  reconciler:
    build:
      context: .
      target: reconciler
    restart: unless-stopped
    env_file:
      - ${GRIDOPS_ENV_FILE:-.env}
    environment:
      GRIDOPS_DATABASE_PATH: /app/data/gridops.sqlite
      GRIDOPS_LOG_DIRECTORY: /app/data/logs
      GRIDOPS_MANAGER_URL: http://manager:8788
    volumes:
      - gridops-data:/app/data
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      api:
        condition: service_healthy
    networks:
      - control-plane

networks:
  control-plane:
    driver: bridge

volumes:
  gridops-data:
